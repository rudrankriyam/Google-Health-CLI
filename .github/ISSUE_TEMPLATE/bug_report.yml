name: Bug report
description: Report a problem with ghealth
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: The command you ran. Remove tokens and private health data.
      render: sh
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste sanitized output.
      render: text
