name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: gofmt -w .
      - run: git diff --exit-code
      - run: go test ./...
      - run: go build ./...
